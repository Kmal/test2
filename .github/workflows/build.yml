name: StickS3 Validation

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sticks3-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static board/config/docs validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate board map
        run: python3 tools/check_board_map.py

      - name: Validate transport config
        run: python3 tools/check_transport_config.py

      - name: Validate factory image tool
        run: python3 tests/tools/test_make_factory_image.py

      - name: Validate LCD keyboard casing
        run: python3 tests/tools/test_status_ui_keyboard.py

      - name: Validate docs consistency
        run: python3 tools/check_docs_consistency.py

  host-unit-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run host tests
        run: tests/host/run_host_tests.sh

  esp-idf-build:
    name: Build StickS3 BLE GATT PCM firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build firmware and 0x0 factory image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          command: |
            idf.py set-target esp32s3
            idf.py build
            python3 tools/make_factory_image.py
            test -s build/m5sticks3_bluetooth_mic.bin
            test -s build/m5sticks3_bluetooth_mic_app.bin
            sha256sum build/m5sticks3_bluetooth_mic.bin > build/m5sticks3_bluetooth_mic.bin.sha256
            sha256sum build/m5sticks3_bluetooth_mic_app.bin > build/m5sticks3_bluetooth_mic_app.bin.sha256
            cat > build/FLASH_THIS_FACTORY_IMAGE.txt <<'EOF'
            Flash m5sticks3_bluetooth_mic.bin at offset 0x0.

            Example:
              esptool.py --chip esp32s3 --port <PORT> erase_flash
              esptool.py --chip esp32s3 --port <PORT> write_flash 0x0 m5sticks3_bluetooth_mic.bin

            m5sticks3_bluetooth_mic_app.bin is included for diagnostics/advanced ESP-IDF workflows only.
            Do not flash any *_app.bin file at 0x0; that is an application-partition image only.
            EOF
            python3 - <<'PY'
            from pathlib import Path
            factory = Path("build/m5sticks3_bluetooth_mic.bin")
            app = Path("build/m5sticks3_bluetooth_mic_app.bin")
            if factory.stat().st_size <= app.stat().st_size:
                raise SystemExit(
                    f"factory image {factory} ({factory.stat().st_size} bytes) "
                    f"is not larger than app image {app} ({app.stat().st_size} bytes)"
                )
            print(f"factory image bytes: {factory.stat().st_size}")
            print(f"app image bytes: {app.stat().st_size}")
            PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: sticks3-ble-gatt-pcm-build
          path: |
            build/m5sticks3_bluetooth_mic.bin
            build/m5sticks3_bluetooth_mic.bin.sha256
            build/m5sticks3_bluetooth_mic_app.bin
            build/m5sticks3_bluetooth_mic_app.bin.sha256
            build/FLASH_THIS_FACTORY_IMAGE.txt
            build/*.elf
            build/*.map
            build/flasher_args.json
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
          retention-days: 14
