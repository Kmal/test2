name: ESP-IDF Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: esp-idf-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware for ESP32-S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ESP-IDF v5.5.4
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.4

      - name: Select ESP32-S3 target
        run: idf.py set-target esp32s3

      - name: Build firmware
        run: idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m5sticks3-bluetooth-mic-build
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: warn
          retention-days: 14
