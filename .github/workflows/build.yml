name: StickS3 Validation

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sticks3-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Static board/config/docs validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate board map
        run: python3 tools/check_board_map.py

      - name: Validate transport config
        run: python3 tools/check_transport_config.py

      - name: Validate docs consistency
        run: python3 tools/check_docs_consistency.py

  host-unit-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run host tests
        run: tests/host/run_host_tests.sh

  esp-idf-build:
    name: Build StickS3 BLE GATT PCM firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ESP-IDF v5.5.4
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.4

      - name: Select ESP32-S3 target
        run: idf.py set-target esp32s3

      - name: Build firmware
        run: idf.py build

      - name: Create 0x0 factory image
        run: |
          python3 tools/make_factory_image.py
          sha256sum build/m5sticks3_bluetooth_mic.bin > build/m5sticks3_bluetooth_mic.bin.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: sticks3-ble-gatt-pcm-build
          path: |
            build/m5sticks3_bluetooth_mic.bin
            build/m5sticks3_bluetooth_mic.bin.sha256
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: warn
          retention-days: 14
